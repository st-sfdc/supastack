server {
    listen 80;

    # ── Frontend (Vite dev server + WebSocket for HMR) ──
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;

        # Required for Vite HMR (hot module reload) over WebSocket
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass localhost so Vite's host check always passes,
        # regardless of what public domain Nginx is reached from.
        proxy_set_header Host              localhost;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
    }

    # ── Backend API ──
    location /api/ {
        # Strip /api prefix before forwarding to backend
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Supabase (Kong API gateway) ──
    location /supabase/ {
        # Strip /supabase prefix before forwarding to Kong
        rewrite ^/supabase/(.*) /$1 break;
        proxy_pass http://supabase-kong:8000;

        proxy_set_header Host              localhost;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Supabase Realtime WebSocket connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
